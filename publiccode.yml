publiccodeYmlVersion: "0.3"
name: Klassa
url: https://github.com/Cetriq/Classify
releaseDate: 2026-03-07
softwareVersion: 1.0.0
platforms:
  - web
  - linux
categories:
  - compliance-management
  - data-analytics
developmentStatus: development
softwareType: standalone/web
description:
  sv:
    shortDescription: AI-drivet informationsklassningssystem för svensk offentlig sektor med stöd för GDPR, OSL och kommunala säkerhetskrav.
    longDescription: Klassa automatiserar klassificering av IT-system, applikationer, processer och datamängder enligt KRT-dimensioner (Konfidentialitet, Riktighet, Tillgänglighet). Systemet använder hybrid klassningsmotor med deterministiska regler och AI-tolkningar för att beräkna säkerhetsnivåer och Level of Assurance.
    features:
      - Automatisk KRT-klassificering enligt tre säkerhetsdimensioner
      - GDPR- och OSL-kompatibel privacy-by-design arkitektur
      - Transparent rationale med konkreta åtgärdsrekommendationer
      - Fullständig revisionslogg och spårbarhet
      - API för batchklassificering och systemintegration
