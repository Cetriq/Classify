publiccodeYmlVersion: "0.3"
name: Klassa
url: https://github.com/Cetriq/Classify
releaseDate: 2026-03-07
softwareVersion: 1.0.0
platforms:
  - web
  - linux
categories:
  - compliance-management
  - data-analytics
  - business-process-management
  - it-security
  - document-management
  - workflow-management
developmentStatus: development
softwareType: standalone/web
description:
  sv:
    shortDescription: AI-drivet informationsklassningssystem för svensk offentlig sektor med stöd för GDPR, OSL och kommunala säkerhetskrav.
    longDescription: Automatiserar klassificering av IT-system enligt K/R/T-modellen (Konfidentialitet, Riktighet, Tillgänglighet). Använder hybrid klassningsmotor med deterministiska regler och AI-tolkningar. Privacy-by-design med fullständig GDPR-kompatibilitet och transparent rationale för varje beslut.
    features:
      - Hybrid klassningsmotor med deterministiska regler och AI-tolkningar
      - Privacy-by-design - AI ser endast metadata
      - GDPR-kompatibel med stöd för känsliga personuppgifter
      - Automatisk beräkning av LoA (Level of Assurance)
      - Transparent rationale och åtgärdsrekommendationer
      - Fullständig revisionslogg och spårbarhet
