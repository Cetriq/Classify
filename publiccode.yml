publiccodeYmlVersion: "0.3"
name: Klassa
url: https://github.com/Cetriq/Classify
releaseDate: 2026-03-07
softwareVersion: 1.0.0
platforms:
  - web
  - linux
categories:
  - compliance-management
  - data-analytics
  - document-management
developmentStatus: development
softwareType: standalone/web
description:
  sv:
    shortDescription: AI-drivet informationsklassningssystem för svensk offentlig sektor med stöd för GDPR, OSL och kommunala säkerhetskrav.
    longDescription: Klassa automatiserar klassificering av IT-system, applikationer, processer och datamängder enligt K/R/T-dimensioner (Konfidentialitet, Riktighet, Tillgänglighet). Systemet använder hybrid klassningsmotor med deterministiska regler och AI-tolkningar, är GDPR-kompatibelt och inkluderar privacy-by-design.
    features:
      - Automatisk K/R/T-klassificering med LoA-beräkning
      - GDPR och OSL-kompatibel hantering
      - Privacy-by-design med AI-metadata maskning
      - Transparent rationale och åtgärdsrekommendationer
      - Fullständig revisionslogg och spårbarhet
