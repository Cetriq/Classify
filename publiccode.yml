description:
  sv:
    shortDescription: AI-drivet informationsklassningssystem för svensk offentlig sektor med stöd för GDPR, OSL och kommunala säkerhetskrav.
    longDescription: Klassa automatiserar klassificering av IT-system, applikationer och datamängder enligt K/R/T-dimensioner (Konfidentialitet, Riktighet, Tillgänglighet). Systemet använder hybrid klassningsmotor med deterministiska regler och AI-tolkningar för att säkerställa GDPR-kompatibilitet och svensk sekretesslagstiftning.
    features:
      - Hybrid klassningsmotor med deterministiska regler och AI-tolkningar
      - GDPR-kompatibel klassning med privacy-by-design
      - K/R/T-klassning med automatisk LoA-beräkning
      - Åtgärdsrekommendationer baserat på säkerhetsnivå
      - Transparent rationale och fullständig revisionslogg
