  - business-process-management
developmentStatus: development
softwareType: standalone/web
description:
  sv:
    shortDescription: AI-drivet informationsklassningssystem för svensk offentlig sektor med stöd för GDPR, OSL och kommunala säkerhetskrav.
    longDescription: Klassa automatiserar klassificering av IT-system, applikationer, processer och datamängder enligt KRT-dimensionerna (Konfidentialitet, Riktighet, Tillgänglighet). Systemet använder hybrid klassningsmotor med deterministiska regler och AI-tolkningar för att säkerställa GDPR-kompatibilitet och följer svensk sekretesslagstiftning.
    features:
      - Hybrid klassningsmotor med deterministiska regler och AI-tolkningar
      - Privacy-by-design - AI ser endast metadata, aldrig råa personuppgifter
      - GDPR-kompatibel klassning med stöd för Art. 9/10 och känsliga personuppgifter
      - Transparent rationale med tydliga förklaringar för varje beslut
      - Åtgärdsrekommendationer med konkreta säkerhetsåtgärder per nivå
