developmentStatus: development
softwareType: standalone/web
description:
  sv:
    shortDescription: AI-drivet informationsklassningssystem för svensk offentlig sektor med GDPR- och OSL-stöd
    longDescription: Automatiserad klassificering av IT-system enligt K/R/T-dimensioner (Konfidentialitet, Riktighet, Tillgänglighet) för svenska myndigheter. Beräknar säkerhetsnivåer, LoA och ger konkreta åtgärdsrekommendationer.
    features:
      - Hybrid klassningsmotor med AI och deterministiska regler
      - GDPR-kompatibel med privacy-by-design
      - Transparent rationale och revisionslogg
      - Åtgärdsrekommendationer per säkerhetsnivå
      - Export till JSON/PDF
