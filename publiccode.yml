platforms:
  - web
  - linux
categories:
  - compliance-management
  - data-analytics
  - business-process-management
developmentStatus: development
softwareType: standalone/web
description:
  sv:
    shortDescription: AI-drivet informationsklassningssystem för svensk offentlig sektor med stöd för GDPR, OSL och kommunala säkerhetskrav.
    longDescription: Klassa automatiserar klassificering av IT-system enligt K/R/T-dimensioner (Konfidentialitet, Riktighet, Tillgänglighet) med hybrid regelmotor och AI-tolkningar. Privacy-by-design säkerställer GDPR-kompatibilitet för svensk offentlig sektor.
    features:
      - Hybrid klassningsmotor med deterministiska regler och AI
      - Privacy-by-design med metadata-baserad AI-analys
      - GDPR- och OSL-kompatibel säkerhetsklassificering
      - Automatisk beräkning av LoA (Level of Assurance)
      - Fullständig revisionslogg och spårbarhet
